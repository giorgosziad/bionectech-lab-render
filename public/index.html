/* ════════ BagPing brand tokens ════════ */
:root{
  --bp-blue:#0099E6;
  --bp-blue-deep:#006BB5;
  --bp-blue-ink:#052744;
  --bp-yellow:#FFD600;
  --bp-yellow-deep:#FFC000;
  --bp-cream:#EAF3FC;
  --bp-sky:#E6F4FE;
  --ink:#0A1628;
  --ink-soft:#28384C;
  --muted:#5C6B82;
  --line:#DCE8F4;
  --paper:#FFFFFF;
  --paper-alt:#E9F3FC;
  --green:#16A34A;
  --red:#DC2626;
  --r-sm:10px;--r-md:16px;--r-lg:24px;--r-xl:32px;--r-pill:999px;
  --shadow-card:0 1px 0 rgba(5,39,68,.04),0 14px 40px rgba(5,39,68,.10);
  --shadow-soft:0 8px 30px rgba(5,39,68,.08);
  --font-ui:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-serif:'DM Serif Display',Georgia,'Times New Roman',serif;
  --maxw:1120px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:var(--font-ui);color:var(--ink);background:var(--paper-alt);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{color:var(--bp-blue-deep);text-decoration:none;}
img,svg{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:0;background:transparent;color:inherit;}
:focus-visible{outline:3px solid var(--bp-yellow);outline-offset:2px;border-radius:6px;}

/* ── layout ── */
.wrap{width:100%;max-width:var(--maxw);margin:0 auto;padding:0 22px;}
.section{padding:84px 0;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--bp-blue-deep);}
.eyebrow::before{content:"";width:22px;height:2px;background:var(--bp-yellow);border-radius:2px;}
.h2{font-family:var(--font-serif);font-weight:400;font-size:clamp(30px,4.4vw,46px);line-height:1.06;letter-spacing:-.01em;color:var(--ink);}
.h2 em{font-style:italic;color:var(--bp-blue-deep);}
.lead{font-size:clamp(16px,1.7vw,19px);color:var(--ink-soft);max-width:62ch;margin-top:14px;}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:700;font-size:15px;padding:14px 22px;border-radius:var(--r-pill);transition:transform .12s ease,box-shadow .2s ease,background .2s ease;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn--yellow{background:var(--bp-yellow);color:var(--bp-blue-ink);box-shadow:0 1px 0 rgba(255,192,0,.55),0 10px 24px rgba(255,214,0,.42);}
.btn--yellow:hover{background:var(--bp-yellow-deep);}
.btn--blue{background:linear-gradient(135deg,var(--bp-blue),var(--bp-blue-deep));color:#fff;box-shadow:0 10px 24px rgba(0,153,230,.34);}
.btn--blue:hover{background:var(--bp-blue-deep);}
.btn--ghost{background:#fff;color:var(--bp-blue-deep);border:1.5px solid #9CC8EA;}
.btn--ghost:hover{border-color:var(--bp-blue);background:var(--bp-sky);}
.btn--ink{background:var(--bp-blue-ink);color:#fff;}
.btn--ink:hover{background:#0a3a63;}

/* ════════ NAV ════════ */
.nav{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.82);backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex:none;background:none;filter:drop-shadow(0 3px 6px rgba(0,107,181,.25));}
.brand-mark svg{width:30px;height:30px;}
.brand-word{font-family:var(--font-serif);font-size:23px;line-height:1;color:var(--bp-blue-ink);letter-spacing:-.2px;}
.brand-word em{font-style:italic;color:var(--bp-blue);}
.nav-right{display:flex;align-items:center;gap:14px;}
.nav-links{display:flex;align-items:center;gap:26px;}
.nav-links a{color:var(--ink-soft);font-weight:600;font-size:14.5px;}
.nav-links a:hover{color:var(--bp-blue-deep);}
.lang{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;color:var(--ink);background:var(--paper);border:1px solid var(--line);padding:8px 12px;border-radius:var(--r-pill);}

/* ════════ HERO ════════ */
.hero{position:relative;color:var(--ink);overflow:hidden;background:linear-gradient(180deg,#F4FAFE 0%,var(--paper-alt) 100%);border-bottom:1px solid var(--line);}
.hero::after{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(0,107,181,.05) 1px,transparent 1px);background-size:26px 26px;pointer-events:none;}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;grid-template-areas:"copy stage" "actions stage";gap:6px 46px;align-items:center;padding:78px 0 90px;position:relative;z-index:1;}
.hero-copy{grid-area:copy;align-self:end;}
.hero-actions{grid-area:actions;align-self:start;}
.hero .stage-card{grid-area:stage;}
.hero .eyebrow{color:var(--bp-blue-deep);}
.hero .eyebrow::before{background:var(--bp-yellow);}
.hero h1{font-family:var(--font-serif);font-weight:400;font-size:clamp(38px,5.6vw,62px);line-height:1.02;letter-spacing:-.015em;margin-top:16px;color:var(--bp-blue-ink);}
.hero h1 em{font-style:italic;color:var(--bp-blue);}
.hero-sub{font-size:clamp(16px,1.8vw,19.5px);color:var(--ink-soft);max-width:54ch;margin-top:20px;}
.hero-cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px;align-items:center;}
.hero-note{margin-top:16px;font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.hero-note b{color:var(--ink);}

/* store badges */
.stores{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px;}
.store{display:inline-flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);color:var(--ink);padding:11px 17px;border-radius:14px;transition:border-color .2s,transform .12s;box-shadow:var(--shadow-soft);}
.store:hover{border-color:var(--bp-blue);transform:translateY(-1px);}
.store svg{width:24px;height:24px;flex:none;}
.store small{display:block;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.store strong{display:block;font-size:15px;font-weight:700;line-height:1.15;}

/* ── hero ping stage ── */
.stage-card{background:transparent;border:none;border-radius:26px;padding:0;box-shadow:none;max-width:440px;margin-inline:auto;width:100%;}
.ping-stage{position:relative;aspect-ratio:1/1;max-width:430px;width:100%;margin:18px auto 4px;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 48%,#EAF4FD 0%,#DCEBF8 72%,#D2E5F6 100%);border-radius:26px;overflow:hidden;}
.belt{position:absolute;inset:auto 0 2% 0;height:56%;overflow:visible;pointer-events:none;}
.carousel-svg{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:104%;height:100%;}
